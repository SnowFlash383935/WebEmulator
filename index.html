<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fleshka Vercel Console</title>
    <script src="https://unpkg.com/nostalgist"></script>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: 'Courier New', monospace; text-align: center; }
        .btn { background: #0f0; color: #000; border: none; padding: 15px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>
    <h2>[ VERCEL_NODE_CORE_v2.0 ]</h2>
    <div id="ui">
        <button class="btn" onclick="location.href='/api/auth'">1. AUTH_SYSTEM</button>
        <button class="btn" onclick="boot()">2. BOOT_ROM</button>
    </div>

    <script>
        // Сохраняем refresh_token из URL если он пришел
        const urlParams = new URLSearchParams(window.location.search);
        const rt = urlParams.get('refresh_token');
        if (rt) localStorage.setItem('fleshka_rt', rt);

        async function boot() {
    const rt = localStorage.getItem('fleshka_rt');
    if (!rt) return alert("AUTH_REQUIRED");

    document.getElementById('ui').style.display = 'none';

    // 1. Формируем путь к твоему прокси на Vercel
    const romPath = "SNES/games/Super Mario World 2 - Yoshi's Island (USA) (Rev 1).sfc";
    const proxyUrl = `/api/rom?refresh_token=${encodeURIComponent(rt)}&path=${encodeURIComponent(romPath)}`;

    try {
        console.log("SYSTEM: FORCING_FETCH_FROM_VERCEL...");
        
        // 2. САМИ скачиваем файл как байты, чтобы Nostalgist не умничал
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error(`PROXY_ERROR: ${response.status}`);
        
        const romBlob = await response.blob();
        console.log("SYSTEM: ROM_BLOB_ACQUIRED, SIZE:", romBlob.size);

        // 3. Скармливаем Nostalgist уже готовый объект, а не ссылку
        await Nostalgist.launch({
            core: 'snes9x',
            rom: romBlob, // Передаем Blob напрямую!
            fileName: 'game.sfc' // Подсказываем расширение
        });

    } catch (err) {
        console.error("BOOT_CRITICAL_FAILURE:", err);
        document.getElementById('ui').style.display = 'block';
        alert("BOOT_FAILED: CHECK_CONSOLE");
    }
}

    </script>
</body>
</html>
