<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleshka Cloud Console</title>
    <script src="https://unpkg.com/nostalgist"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #ui { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .game-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }
        .btn { background: #0f0; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { background: #fff; box-shadow: 0 0 15px #0f0; transform: translateY(-2px); }
        .status { color: #888; font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid #222; width: 100%; text-align: center; padding-bottom: 10px; }
        h2 { letter-spacing: 4px; border: 1px solid #0f0; padding: 10px 20px; }
        #controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>[ FLESHKA_OS_v2.2 ]</h2>
        <div class="status" id="log">SYSTEM: STANDBY</div>
        
        <div id="controls">
            <button class="btn" onclick="location.href='/api/auth'">1. RE_AUTH / LOGIN</button>
            <button class="btn" onclick="loadLibrary()">2. LOAD_LIBRARY</button>
        </div>

        <div class="game-list" id="gameList"></div>
    </div>
    <script type="module">
    import pako from 'https://esm.sh/pako@2.1.0';

    const log = document.getElementById('log');

    async function convertFrzToState(fileBuffer) {
        try {
            const decompressedData = pako.ungzip(new Uint8Array(fileBuffer));
            return decompressedData;
        } catch (err) {
            return new Uint8Array(fileBuffer);
        }
    }
    
    // --- ЛОГИКА URL И ТОКЕНОВ ---
    const urlParams = new URLSearchParams(window.location.search);
    let rt = urlParams.get('refresh_token') || localStorage.getItem('fleshka_rt');
    const autoGame = urlParams.get('game'); // Берем игру из поиска

    if (rt) {
        localStorage.setItem('fleshka_rt', rt);
        
        // ОЧИСТКА URL: Оставляем игру, убираем токен
        const newUrl = new URL(window.location);
        newUrl.searchParams.delete('refresh_token');
        if (autoGame) newUrl.searchParams.set('game', autoGame);
        window.history.replaceState({}, document.title, newUrl.pathname + newUrl.search);
        
        log.innerText = "SYSTEM: READY";
        
        // АВТОЗАПУСК: Если в закладке была игра, стартуем её сразу
        if (autoGame) {
            console.log("SYSTEM: AUTOSTART_INITIATED ->", autoGame);
            // Небольшая задержка, чтобы UI успел отрисоваться
            setTimeout(() => window.bootGame(autoGame + '.sfc'), 500);
        }
    }

    async function loadLibrary() {
        if (!rt) return alert("AUTH_REQUIRED");
        log.innerText = "SYSTEM: SCANNING...";
        try {
            const res = await fetch(`/api/list?refresh_token=${encodeURIComponent(rt)}`);
            const games = await res.json();
            const container = document.getElementById('gameList');
            container.innerHTML = ''; 

            games.forEach(game => {
                const b = document.createElement('button');
                b.className = 'btn';
                const displayName = game.replace('.sfc', '').replace('.smc', '');
                b.innerText = `> ${displayName}`;
                
                // При клике на игру — обновляем URL (для удобства создания закладки)
                b.onclick = () => {
                    const newUrl = new URL(window.location);
                    newUrl.searchParams.set('game', displayName);
                    window.history.pushState({}, '', newUrl);
                    window.bootGame(game);
                };
                container.appendChild(b);
            });
            log.innerText = "SYSTEM: LIBRARY_LOADED";
            document.getElementById('controls').style.display = 'none';
        } catch (e) { log.innerText = "SYSTEM: ERROR"; }
    }

    async function bootGame(fileName) {
        document.getElementById('ui').style.display = 'none';
        const baseName = fileName.replace(/\.(sfc|smc)$/, '');
        const saveName = baseName + '.srm';
        const stateName = baseName + '.0A.frz';
        
        const romUrl = `/api/rom?refresh_token=${encodeURIComponent(rt)}&path=${encodeURIComponent('SNES/games/' + fileName)}`;
        const saveUrl = `/api/srm/load?refresh_token=${encodeURIComponent(rt)}&fileName=${encodeURIComponent(saveName)}`;
        const stateUrl = `/api/srm/load?refresh_token=${encodeURIComponent(rt)}&fileName=${encodeURIComponent(stateName)}`;

        try {
            const [romRes, sRes, stRes] = await Promise.all([
                fetch(romUrl), fetch(saveUrl), fetch(stateUrl)
            ]);

            const romBlob = await romRes.blob();
            let saveData = sRes.ok ? new Uint8Array(await sRes.arrayBuffer()) : null;
            let stateData = stRes.ok ? await convertFrzToState(await stRes.arrayBuffer()) : null;

            await Nostalgist.launch({
                core: 'snes9x',
                rom: romBlob,
                fileName: fileName,
                sram: saveData,
                state: stateData
            });
        } catch (err) {
            alert("BOOT_FAILED");
            document.getElementById('ui').style.display = 'block';
        }
    }

    window.loadLibrary = loadLibrary;
    window.bootGame = bootGame;
    </script>
</body>
</html>
