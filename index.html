<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fleshka Cloud Console</title>
    <script src="https://unpkg.com/nostalgist"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: 'Courier New', monospace; margin: 0; }
        #ui { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .game-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; width: 100%; max-width: 800px; margin-top: 20px; }
        .btn { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn:hover { background: #fff; box-shadow: 0 0 10px #0f0; }
        .status { color: #888; font-size: 0.8em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>[ FLESHKA_OS_v2.1 ]</h2>
        <div class="status" id="log">SYSTEM: STANDBY</div>
        
        <div id="controls">
            <button class="btn" onclick="location.href='/api/auth'">1. RE_AUTH</button>
            <button class="btn" style="margin-top:10px" onclick="loadLibrary()">2. LOAD_LIBRARY</button>
        </div>

        <div class="game-list" id="gameList"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const rt = urlParams.get('refresh_token') || localStorage.getItem('fleshka_rt');
        if (rt) {
            localStorage.setItem('fleshka_rt', rt);
            document.getElementById('log').innerText = "SYSTEM: READY_TO_LOAD";
        }

        async function loadLibrary() {
            const token = localStorage.getItem('fleshka_rt');
            if (!token) return alert("AUTH_REQUIRED");

            const log = document.getElementById('log');
            log.innerText = "SYSTEM: SCANNING_CLOUD...";

            try {
                const res = await fetch(`/api/list?refresh_token=${encodeURIComponent(token)}`);
                const games = await res.json();
                
                const container = document.getElementById('gameList');
                container.innerHTML = ''; // Очистка

                games.forEach(game => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = `> ${game.replace('.sfc', '').replace('.smc', '')}`;
                    b.onclick = () => bootGame(game);
                    container.appendChild(b);
                });
                
                log.innerText = `SYSTEM: ${games.length}_GAMES_FOUND`;
                document.getElementById('controls').style.display = 'none';
            } catch (e) {
                log.innerText = "SYSTEM: SCAN_FAILED";
            }
        }

async function bootGame(fileName) {
    const rt = localStorage.getItem('fleshka_rt');
    const log = document.getElementById('log');
    document.getElementById('ui').style.display = 'none';

    // Подготавливаем имена
    const saveName = fileName.replace(/\.(sfc|smc)$/, '.srm');
    const stateName = fileName.replace(/\.(sfc|smc)$/, '.0A.frz');
    const romUrl = `/api/rom?refresh_token=${encodeURIComponent(rt)}&path=${encodeURIComponent('SNES/games/' + fileName)}`;
    const saveUrl = `/api/srm/load?refresh_token=${encodeURIComponent(rt)}&fileName=${encodeURIComponent(saveName)}`;
    const stateUrl = `/api/srm/load?refresh_token=${encodeURIComponent(rt)}&fileName=${encodeURIComponent(stateName)}`;

    try {
        log.innerText = "SYSTEM: FETCHING_ASSETS...";
        
        // 1. Качаем РОМ
        const romRes = await fetch(romUrl);
        const romBlob = await romRes.blob();

        // 2.1. Пробуем скачать сейв
        let saveData = null;
        try {
            const saveRes = await fetch(saveUrl);
            if (saveRes.ok) {
                saveData = await saveRes.arrayBuffer();
                console.log("SYSTEM: SAVE_FOUND_AND_LOADED");
            }
        } catch (e) {
            console.log("SYSTEM: NO_SAVE_FOUND, STARTING_FRESH");
        }
        
        // 2.2. Пробуем скачать стейт
        let stateData = null;
        try {
            const stateRes = await fetch(stateUrl);
            if (stateRes.ok) {
                stateData = await stateRes.arrayBuffer();
                console.log("SYSTEM: STATE_FOUND_AND_LOADED");
            }
        } catch (e) {
            console.log("SYSTEM: NO_STATE_FOUND, STARTING_FRESH");
        }
        
        // 3. Запуск
        const emulator = await Nostalgist.launch({
            core: 'snes9x',
            rom: romBlob,
            fileName: fileName,
            // Магия Nostalgist: передаем начальное состояние файловой системы
            sram: saveData ? new Blob([saveData]) : null,
            state: stateData ? new Blob([stateData]) : null
        });
        
    } catch (err) {
        console.error(err);
        alert("CRITICAL_BOOT_FAILURE");
        document.getElementById('ui').style.display = 'block';
    }
}
    </script>
</body>
</html>
