<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fleshka Vercel Console</title>
    <script src="https://unpkg.com/nostalgist"></script>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: 'Courier New', monospace; text-align: center; }
        .btn { background: #0f0; color: #000; border: none; padding: 15px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>
    <h2>[ VERCEL_NODE_CORE_v2.0 ]</h2>
    <div id="ui">
        <button class="btn" onclick="location.href='/api/auth'">1. AUTH_SYSTEM</button>
        <button class="btn" onclick="boot()">2. BOOT_ROM</button>
    </div>

    <script>
        // Сохраняем refresh_token из URL если он пришел
        const urlParams = new URLSearchParams(window.location.search);
        const rt = urlParams.get('refresh_token');
        if (rt) localStorage.setItem('fleshka_rt', rt);

        async function boot() {
            const rt = localStorage.getItem('fleshka_rt');
            if (!rt) return alert("AUTH_REQUIRED");

            document.getElementById('ui').style.display = 'none';

            // Тянем РОМ через наш прокси
            const romUrl = `/api/rom?refresh_token=${rt}&path=SNES/games/Super Mario World (USA).sfc`;

            await Nostalgist.launch({
                core: 'snes9x',
                rom: romUrl // Nostalgist сам сделает fetch к твоему API
            });
        }
    </script>
</body>
</html>
